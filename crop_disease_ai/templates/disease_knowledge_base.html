<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-base: #0A0A0F;
            --bg-surface: #12121A;
            --bg-glass: rgba(18, 18, 26, 0.72);
            --text: #E4E4E7;
            --text-secondary: #A1A1AA;
            --border: rgba(255, 255, 255, 0.08);
            --primary: #5E6AD2;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }
        .card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .gradient-text-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #7C5CBF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h4 {
            margin-top: 1rem;
            font-weight: 700;
            color: var(--text);
        }
        ul {
            margin: 0.5rem 0;
            padding-left: 1.25rem;
        }
        li {
            margin: 0.3rem 0;
            color: var(--text-secondary);
        }
        .severity-indicator {
            display: flex;
            align-items: center;
            margin: 0.25rem 0;
            font-size: 0.85rem;
        }
        .severity-badge {
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-right: 0.5rem;
            flex-shrink: 0;
            color: white;
        }
    </style>
</head>
<body>
    <div class="main-header" style="margin-bottom: 1.5rem;">
        <h1>📖 Disease Knowledge Base</h1>
        <p>Comprehensive information about crop diseases, symptoms, causes, and treatments</p>
    </div>

    <p style="color:#888;margin-bottom:1rem;">Showing 15 disease records</p>

    <!-- Disease cards will be dynamically generated by Streamlit -->
</body>
</html>
