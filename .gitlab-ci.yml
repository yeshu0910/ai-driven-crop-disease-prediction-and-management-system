stages:
  - lint
  - format
  - type_check
  - dead_code
  - test
  - coverage
  - security
  - compliance

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip/

.python:
  image: python:3.11

# ---------------- LINT ----------------
lint:
  stage: lint
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .

# ---------------- FORMAT ----------------
format:
  stage: format
  image: python:3.11
  script:
    - pip install ruff
    - ruff format --check .

# ---------------- TYPE CHECK ----------------
type_check:
  stage: type_check
  image: python:3.11
  script:
    - pip install mypy
    - mypy . || true

# ---------------- DEAD CODE ----------------
dead_code:
  stage: dead_code
  image: python:3.11
  script:
    - pip install vulture
    - vulture crop_disease_ai || true

# ---------------- TEST ----------------
test:
  stage: test
  image: python:3.11
  script:
    - cd crop_disease_ai
    - pip install --upgrade pip
    - pip install --retries 10 --timeout 120 -r requirements.txt
    - pip install pytest pytest-cov
    - pytest
# ---------------- COVERAGE ----------------
coverage:
  stage: coverage
  image: python:3.11
  script:
    - pip install pytest pytest-cov
    - pytest --cov=. --cov-report=term-missing

# ---------------- SECURITY ----------------
security_scan:
  stage: security
  image: python:3.11
  script:
    - pip install bandit
    - bandit -r . || true

dependency_audit:
  stage: security
  image: python:3.11
  script:
    - pip install pip-audit
    - pip-audit || true

semgrep:
  stage: security
  image: semgrep/semgrep
  script:
    - semgrep scan --config auto .
  allow_failure: true

# ---------------- COMPLIANCE ----------------
compliance:
  stage: compliance
  image: python:3.11
  script:
    - test -f README.md
    - test -f LICENSE || true
    - test -f SECURITY.md || true