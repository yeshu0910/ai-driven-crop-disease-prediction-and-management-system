stages:
  - lint
  - typecheck
  - security
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  RUFF_CACHE_DIR: "$CI_PROJECT_DIR/.cache/ruff"
  PYTHON_VERSION: "3.11"

before_script:
  - python --version
  - pip install -U pip setuptools wheel

lint:
  stage: lint
  image: python:$PYTHON_VERSION
  cache:
    paths:
      - .cache/pip
      - .cache/ruff
  script:
    - pip install ruff
    - ruff check --output-format=gitlab .
    - ruff format --check .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

typecheck:
  stage: typecheck
  image: python:$PYTHON_VERSION
  cache:
    paths:
      - .cache/pip
  script:
    - pip install mypy
    - pip install -e .
    - mypy src/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

security_secrets:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --report-path gitleaks-report.json --report-format json
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

security_bandit:
  stage: security
  image: python:$PYTHON_VERSION
  cache:
    paths:
      - .cache/pip
  script:
    - pip install bandit
    - bandit -r src/ -f json -o bandit-report.json || true
    - bandit -r src/
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

security_dependency:
  stage: security
  image: python:$PYTHON_VERSION
  cache:
    paths:
      - .cache/pip
  script:
    - pip install pip-audit
    - pip-audit --requirement pyproject.toml || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test:
  stage: test
  image: python:$PYTHON_VERSION
  cache:
    paths:
      - .cache/pip
  script:
    - pip install -e ".[dev]"
    - pytest --cov=src --cov-report=term --cov-report=xml --cov-fail-under=80
  artifacts:
    paths:
      - coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

build_docker:
  stage: build
  image: docker:24-git
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

deploy_staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: $STAGING_URL
  script:
    - apk add --no-cache curl
    - curl -X POST $STAGING_DEPLOY_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual

deploy_production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: $PRODUCTION_URL
  script:
    - apk add --no-cache curl
    - curl -X POST $PRODUCTION_DEPLOY_WEBHOOK
  rules:
    - if: $CI_COMMIT_TAG
  when: manual
