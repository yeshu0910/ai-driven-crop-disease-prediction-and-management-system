stages:
  - lint
  - format
  - typecheck
  - security
  - test
  - coverage
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_PREFER_BINARY: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

.default_cache: &default_cache
  key: pip-cache
  paths:
    - .cache/pip
  policy: pull-push

lint:
  stage: lint
  image: python:3.11-slim
  cache:
    <<: *default_cache
  script:
    - pip install ruff
    - ruff check --output-format=gitlab .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

format:
  stage: format
  image: python:3.11-slim
  cache:
    <<: *default_cache
  script:
    - pip install ruff
    - ruff format --check .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

typecheck:
  stage: typecheck
  image: python:3.11-slim
  cache:
    <<: *default_cache
  script:
    - pip install mypy
    - mypy .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

security_secrets:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --report-path gitleaks-report.json --report-format json
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

security_bandit:
  stage: security
  image: python:3.11-slim
  cache:
    <<: *default_cache
  script:
    - pip install bandit
    - bandit -r crop_disease_ai/ -f json -o bandit-report.json -s B101,B110,B311 --exclude tests || true
    - bandit -r crop_disease_ai/ -s B101,B110,B311 --exclude tests
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

security_dependency:
  stage: security
  image: python:3.11-slim
  cache:
    <<: *default_cache
  script:
    - pip install pip-audit
    - pip-audit --requirement pyproject.toml || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test:
  stage: test
  image: python:3.11-slim
  cache:
    <<: *default_cache
  timeout: 15 minutes
  script:
    - pip install -e ".[test]"
    - pytest --cov=. --cov-report=term --cov-report=xml
  artifacts:
    paths:
      - coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

coverage:
  stage: coverage
  image: python:3.11-slim
  cache:
    <<: *default_cache
  timeout: 15 minutes
  script:
    - pip install -e ".[test]"
    - pytest --cov=. --cov-report=term --cov-report=html --cov-report=xml --cov-fail-under=80
  artifacts:
    paths:
      - coverage.xml
      - htmlcov/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

build_docker:
  stage: build
  image: docker:24-git
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

deploy_staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: $STAGING_URL
  script:
    - apk add --no-cache curl
    - curl -X POST $STAGING_DEPLOY_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual

deploy_production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: $PRODUCTION_URL
  script:
    - apk add --no-cache curl
    - curl -X POST $PRODUCTION_DEPLOY_WEBHOOK
  rules:
    - if: $CI_COMMIT_TAG
  when: manual
