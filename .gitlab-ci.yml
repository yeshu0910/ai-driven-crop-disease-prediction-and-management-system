stages:
  - static_analysis
  - security
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_TLS_CERTDIR: ""   # REQUIRED for docker:dind

cache:
  paths:
    - .cache/pip/

# ================= BASE PYTHON TEMPLATE =================
.python_job:
  image: python:3.11
  before_script:
    - python --version
    - python -m pip install --upgrade pip

# ================= STATIC ANALYSIS =================

lint_and_format:
  extends: .python_job
  stage: static_analysis
  script:
    - pip install -e ".[lint]"
    - ruff check .

typecheck:
  extends: .python_job
  stage: static_analysis
  script:
    - pip install -e ".[typecheck]"
    - mypy crop_disease_ai

# ================= SECURITY =================

security_bandit:
  extends: .python_job
  stage: security
  needs: []
  script:
    - pip install -e ".[sec]"
    - bandit -r crop_disease_ai -x tests

# ================= TEST =================

test_and_coverage:
  extends: .python_job
  stage: test
  needs:
    - lint_and_format
    - typecheck
    - security_bandit
    - security_secrets
    - security_dependency
  script:
    - pip install -e ".[test]"
    - pytest --cov=crop_disease_ai --cov-report=html
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/

# ================= BUILD DOCKER IMAGE =================

build_docker:
  stage: build
  image: docker:24
  needs:
    - test_and_coverage
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
  script:
    - docker version
    - docker build -t crop-disease-ai:latest .
    - docker images

# ================= DEPLOY =================

deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploy staging complete"
