
stages:
  - validate
  - lint
  - format
  - type_check
  - test
  - coverage
  - security
  - compliance


# =============================
# BASE TEMPLATE (SAFE)
# =============================
.default_python:
  image: python:3.11
  before_script:
    - python -m pip install --upgrade pip

    # ONLY validate once (not every job blindly failing CI)
    - if [ ! -f requirements.txt ]; then echo "❌ requirements.txt missing in commit $CI_COMMIT_SHA"; ls -lah; exit 1; fi

    - pip install -r requirements.txt


# =============================
# VALIDATION
# =============================
validate_repo:
  extends: .default_python
  stage: validate
  script:
    - echo "🔍 Repo structure check"
    - find . -name requirements.txt
    - test -f README.md


# =============================
# LINT
# =============================
lint:
  extends: .default_python
  stage: lint
  script:
    - pip install ruff pylint flake8
    - ruff check .
    - pylint . || true
    - flake8 . --max-line-length=120 || true


# =============================
# FORMAT
# =============================
format:
  extends: .default_python
  stage: format
  script:
    - pip install ruff
    - ruff format --check .


# =============================
# TYPE CHECK
# =============================
type_check:
  extends: .default_python
  stage: type_check
  script:
    - pip install mypy
    - mypy . || true


# =============================
# TEST
# =============================
test:
  extends: .default_python
  stage: test
  script:
    - pip install pytest pytest-cov
    - python -c "import httpx, numpy, dotenv; print('OK')"
    - pytest


# =============================
# COVERAGE
# =============================
coverage:
  extends: .default_python
  stage: coverage
  script:
    - pip install pytest pytest-cov
    - pytest --cov=crop_disease_ai --cov-report=term-missing


# =============================
# SECURITY
# =============================
security_scan:
  extends: .default_python
  stage: security
  script:
    - pip install bandit pip-audit
    - bandit -r . || true
    - pip-audit || true


semgrep:
  stage: security
  image: semgrep/semgrep
  script:
    - semgrep scan --config auto .
  allow_failure: true


# =============================
# COMPLIANCE
# =============================
compliance:
  image: python:3.11
  stage: compliance
  script:
    - test -f README.md
    - test -f LICENSE || true
    - test -f SECURITY.md || true