stages:
  - lint
  - format
  - type_check
  - dead_code
  - test
  - coverage
  - security
  - compliance


# ---------------- LINT (Ruff only - fast + modern) ----------------
lint:
  stage: lint
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .


# ---------------- FORMAT CHECK ----------------
format:
  stage: format
  image: python:3.11
  script:
    - pip install ruff
    - ruff format --check .


# ---------------- TYPE CHECK ----------------
type_check:
  stage: type_check
  image: python:3.11
  script:
    - pip install mypy
    - mypy crop_disease_ai


# ---------------- DEAD CODE ----------------
dead_code:
  stage: dead_code
  image: python:3.11
  script:
    - pip install vulture
    - vulture crop_disease_ai


# ---------------- TEST ----------------
test:
  stage: test
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pip install pytest
    - pytest -q


# ---------------- COVERAGE ----------------
coverage:
  stage: coverage
  image: python:3.11
  script:
    - pip install pytest pytest-cov
    - pytest --cov=crop_disease_ai --cov-report=term-missing --cov-fail-under=80


# ---------------- SECURITY (FIXED) ----------------
security_scan:
  stage: security
  image: python:3.11
  script:
    - pip install bandit pip-audit
    - bandit -r crop_disease_ai -ll
    - pip-audit


semgrep:
  stage: security
  image: semgrep/semgrep
  script:
    - semgrep scan --config auto .


# ---------------- COMPLIANCE ----------------
compliance:
  stage: compliance
  image: python:3.11
  script:
    - test -f README.md
    - test -f LICENSE || true
    - test -f SECURITY.md || true
    