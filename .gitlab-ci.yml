stages:
  - static_analysis
  - security
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip/

# 🔥 Base Python template (must be hidden job)
.python_job:
  image: python:3.11
  before_script:
    - python --version
    - python -m pip install --upgrade pip

# ---------------- STATIC ANALYSIS ----------------

lint_and_format:
  extends: .python_job
  stage: static_analysis
  script:
    - pip install -e ".[lint]"
    - ruff check .

typecheck:
  extends: .python_job
  stage: static_analysis
  script:
    - pip install -e ".[typecheck]"
    - mypy crop_disease_ai

# ---------------- SECURITY ----------------

security_bandit:
  extends: .python_job
  stage: security
  script:
    - pip install -e ".[sec]"
    - bandit -r crop_disease_ai -x tests

# ---------------- TEST ----------------

test_and_coverage:
  extends: .python_job
  stage: test
  script:
    - pip install -e ".[test]"
    - pytest --cov=crop_disease_ai --cov-report=html
  artifacts:
    paths:
      - htmlcov/

# ---------------- DEPLOY ----------------

deploy_staging:
  image: alpine:latest
  stage: deploy
  script:
    - echo "Deploy staging complete"