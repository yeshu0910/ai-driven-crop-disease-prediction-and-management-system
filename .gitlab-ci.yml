stages:
  - lint
  - format
  - type_check
  - dead_code
  - test
  - coverage
  - security
  - compliance

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip/

# ---------------- BASE TEMPLATE ----------------
.python:
  image: python:3.11
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt

# ---------------- LINT ----------------
lint:
  extends: .python
  stage: lint
  script:
    - pip install ruff
    - ruff check .

# ---------------- FORMAT ----------------
format:
  extends: .python
  stage: format
  script:
    - pip install ruff
    - ruff format --check .

# ---------------- TYPE CHECK ----------------
type_check:
  extends: .python
  stage: type_check
  script:
    - pip install mypy
    - mypy . || true

# ---------------- DEAD CODE ----------------
dead_code:
  extends: .python
  stage: dead_code
  script:
    - pip install vulture
    - vulture crop_disease_ai || true

# ---------------- TEST ----------------
test:
  extends: .python
  stage: test
  script:
    - pip install pytest pytest-cov
    - python -c "import httpx, numpy, dotenv; print('DEPENDENCIES OK')"
    - pytest

# ---------------- COVERAGE ----------------
coverage:
  extends: .python
  stage: coverage
  script:
    - pip install pytest pytest-cov
    - pytest --cov=crop_disease_ai --cov-report=term-missing

# ---------------- SECURITY ----------------
security_scan:
  extends: .python
  stage: security
  script:
    - pip install bandit
    - bandit -r . || true

dependency_audit:
  extends: .python
  stage: security
  script:
    - pip install pip-audit
    - pip-audit || true

semgrep:
  stage: security
  image: semgrep/semgrep
  script:
    - semgrep scan --config auto .
  allow_failure: true

# ---------------- COMPLIANCE ----------------
compliance:
  image: python:3.11
  stage: compliance
  script:
    - test -f README.md
    - test -f LICENSE || true
    - test -f SECURITY.md || true