stages:
  - lint
  - type_check
  - test
  - security
  - compliance

# =========================================================
# GLOBAL DEFAULTS, CACHING, & VARIABLES
# =========================================================
default:
  image: python:3.11-slim
  before_script:
    - python -V
    - pip install --upgrade pip
  cache:
    key:
      files:
        - setup.py
        - requirements.txt  # Reduced to 2 files to resolve the validation error
    paths:
      - .cache/pip

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_ROOT_USER_ACTION: "ignore"

# =========================================================
# STAGE 1: LINT (Fast structural/syntax validation)
# =========================================================
ruff_lint_and_format:
  stage: lint
  script:
    - pip install ruff
    - ruff check .
    - ruff format --check .

# =========================================================
# STAGE 2: TYPE CHECK & DEAD CODE
# =========================================================
type_check:
  stage: type_check
  script:
    - pip install -e .
    - pip install mypy
    - mypy .
  allow_failure: true

dead_code:
  stage: type_check
  script:
    - pip install vulture
    - vulture .
  allow_failure: true

# =========================================================
# STAGE 3: TEST & COVERAGE
# =========================================================
test_and_coverage:
  stage: test
  script:
    - pip install -e .[test] || pip install pytest pytest-cov .
    - pytest --cov=crop_disease_ai --cov-report=term --cov-report=xml:coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  allow_failure: true

# =========================================================
# STAGE 4: SECURITY SCANS
# =========================================================
security_scan:
  stage: security
  script:
    - pip install bandit
    - bandit -r crop_disease_ai/
  allow_failure: true

dependency_audit:
  stage: security
  script:
    - pip install pip-audit
    - pip-audit
  allow_failure: true

semgrep:
  stage: security
  image: semgrep/semgrep
  before_script: [] 
  script:
    - semgrep scan --config auto .
  allow_failure: true

# =========================================================
# STAGE 5: COMPLIANCE CHECK
# =========================================================
compliance:
  stage: compliance
  script:
    - test -f README.md
    - test -f LICENSE || echo "Warning: Missing LICENSE file"
    - test -f SECURITY.md || echo "Warning: Missing SECURITY.md file"