stages:
  - lint
  - format
  - type_check
  - dead_code
  - test
  - coverage
  - security
  - compliance


# =========================
# LINT (RUFF ONLY)
# =========================
lint:
  stage: lint
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .


# =========================
# FORMAT CHECK (RUFF)
# =========================
format:
  stage: format
  image: python:3.11
  script:
    - pip install ruff
    - ruff format --check .


# =========================
# TYPE CHECK
# =========================
type_check:
  stage: type_check
  image: python:3.11
  script:
    - pip install mypy
    - mypy . || true


# =========================
# DEAD CODE CHECK
# =========================
dead_code:
  stage: dead_code
  image: python:3.11
  script:
    - pip install vulture
    - vulture . || true


# =========================
# TESTS
# =========================
test:
  stage: test
  image: python:3.11
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest
  allow_failure: true


# =========================
# COVERAGE (FIXED)
# =========================
coverage:
  stage: coverage
  image: python:3.11
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest --cov=crop_disease_ai --cov-report=xml --cov-report=term-missing
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
  allow_failure: true


# =========================
# SECURITY SCANS
# =========================
security_scan:
  stage: security
  image: python:3.11
  script:
    - pip install bandit
    - bandit -r . || true


dependency_audit:
  stage: security
  image: python:3.11
  script:
    - pip install pip-audit
    - pip-audit || true


semgrep:
  stage: security
  image: semgrep/semgrep
  script:
    - semgrep scan --config auto .
  allow_failure: true


# =========================
# LINT (EXTRA OPTIONAL RUFF RUN)
# =========================
ruff_extended:
  stage: lint
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .
    - ruff format --check .
  allow_failure: true


# =========================
# COMPLIANCE CHECK (FIXED)
# =========================
compliance:
  stage: compliance
  image: python:3.11
  script:
    - test -f README.md
    - test -f LICENSE || true
    - test -f SECURITY.md || true