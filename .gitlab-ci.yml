stages:
  - static_analysis
  - security
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip/

.python_job:
  image: python:3.11
  before_script:
    - python --version
    - python -m pip install --upgrade pip

lint_and_format:
  extends: .python_job
  stage: static_analysis
  script:
    - pip install -e ".[lint]"
    - ruff check .

typecheck:
  extends: .python_job
  stage: static_analysis
  script:
    - pip install -e ".[typecheck]"
    - mypy crop_disease_ai

security_bandit:
  extends: .python_job
  stage: security
  script:
    - pip install -e ".[sec]"
    - bandit -r crop_disease_ai -x tests

test_and_coverage:
  extends: .python_job
  stage: test
  script:
    - pip install -e ".[test]"
    - pytest
  artifacts:
    paths:
      - htmlcov/

deploy_staging:
  image: alpine
  stage: deploy
  script:
    - echo "Deploy staging complete"