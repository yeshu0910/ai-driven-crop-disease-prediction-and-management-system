stages:
  - static_analysis
  - security
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_DEFAULT_TIMEOUT: "120"

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .cache/pip/
  policy: pull-push

default:
  image: python:3.11
  before_script:
    - python --version
    - python -m pip install --upgrade pip --retries 10
    - pip config set global.cache-dir "$PIP_CACHE_DIR"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint_and_format:
  stage: static_analysis
  script:
    - pip install --cache-dir $PIP_CACHE_DIR ruff
    - ruff check .
    - ruff format --check .
  allow_failure: false

typecheck:
  stage: static_analysis
  script:
    - pip install --cache-dir $PIP_CACHE_DIR mypy
    - mypy crop_disease_ai
  allow_failure: false

security_bandit:
  stage: security
  script:
    - pip install --cache-dir $PIP_CACHE_DIR bandit
    - bandit -r crop_disease_ai -x tests -s B311
  allow_failure: false

test_and_coverage:
  stage: test
  script:
    - pip install --cache-dir $PIP_CACHE_DIR -e .
    - pip install --cache-dir $PIP_CACHE_DIR pytest pytest-cov
    - pytest --maxfail=1 --disable-warnings
  allow_failure: false

build_docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - echo "Skipping docker build for now"

deploy_staging:
  stage: deploy
  image: alpine
  script:
    - echo "Deploy staging"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  when: manual