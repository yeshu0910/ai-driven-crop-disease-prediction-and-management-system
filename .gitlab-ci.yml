stages:
  - lint
  - format
  - type_check
  - dead_code
  - test
  - coverage
  - security
  - compliance

# =========================
# LINT (RUFF)
# =========================
lint:
  stage: lint
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .

# =========================
# FORMAT CHECK
# =========================
format:
  stage: format
  image: python:3.11
  script:
    - pip install ruff
    - ruff format --check .

# =========================
# TYPE CHECK
# =========================
type_check:
  stage: type_check
  image: python:3.11
  script:
    - pip install mypy
    - mypy .

# =========================
# DEAD CODE CHECK
# =========================
dead_code:
  stage: dead_code
  image: python:3.11
  script:
    - pip install vulture
    - vulture .
  allow_failure: true

# =========================
# TESTS
# =========================
test:
  stage: test
  image: python:3.11
  script:
    - pip install --upgrade pip
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest
  allow_failure: true

# =========================
# COVERAGE
# =========================
coverage:
  stage: coverage
  image: python:3.11
  cache:
    paths:
      - .cache/pip/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    PIP_DEFAULT_TIMEOUT: "300"
  script:
    - pip install --upgrade pip
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest --cov=. --cov-report=xml --cov-report=term-missing
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
  allow_failure: true

# =========================
# SECURITY SCANS
# =========================
security_scan:
  stage: security
  image: python:3.11
  script:
    - pip install bandit
    - bandit -r .
  allow_failure: true

dependency_audit:
  stage: security
  image: python:3.11
  script:
    - pip install pip-audit
    - pip-audit
  allow_failure: true

semgrep:
  stage: security
  image: semgrep/semgrep
  script:
    - semgrep scan --config auto .
  allow_failure: true

# =========================
# EXTRA RUFF CHECK
# =========================
ruff_extended:
  stage: lint
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .
    - ruff format --check .
  allow_failure: true

# =========================
# COMPLIANCE CHECK
# =========================
compliance:
  stage: compliance
  image: python:3.11
  script:
    - test -f README.md
    - test -f LICENSE || true
    - test -f SECURITY.md || true