stages:
  - static_analysis
  - security
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.11"

cache:
  key: pip-cache
  paths:
    - .cache/pip

.python_light: &python_light
  image: python:$PYTHON_VERSION
  before_script:
    - python --version
    - pip install -U pip
    - pip install ruff mypy bandit pytest pytest-cov

.python_full: &python_full
  image: python:$PYTHON_VERSION
  before_script:
    - python --version
    - pip install -U pip
    - pip install -e .

.workflow_rules: &workflow_rules
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint_and_format:
  <<: *python_light
  stage: static_analysis
  script:
    - ruff check .
    - ruff format --check .
  <<: *workflow_rules

typecheck:
  <<: *python_light
  stage: static_analysis
  script:
    - mypy crop_disease_ai
  <<: *workflow_rules

security_bandit:
  <<: *python_light
  stage: security
  script:
    - bandit -r crop_disease_ai -x tests
  <<: *workflow_rules

test_and_coverage:
  <<: *python_full
  stage: test
  script:
    - pytest --maxfail=1 --disable-warnings
  <<: *workflow_rules

build_docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - echo "Skipping docker build for now"
  <<: *workflow_rules

deploy_staging:
  stage: deploy
  image: alpine
  script:
    - echo "Deploy staging"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  when: manual