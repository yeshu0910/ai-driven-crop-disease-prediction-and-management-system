stages:
  - lint
  - format
  - type_check
  - dead_code
  - test
  - coverage
  - security
  - compliance


# =========================
# LINT
# =========================
lint:
  stage: lint
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .


# =========================
# FORMAT
# =========================
format:
  stage: format
  image: python:3.11
  script:
    - pip install ruff
    - ruff format --check .


# =========================
# TYPE CHECK
# =========================
type_check:
  stage: type_check
  image: python:3.11
  script:
    - pip install mypy
    - mypy . || true


# =========================
# DEAD CODE
# =========================
dead_code:
  stage: dead_code
  image: python:3.11
  script:
    - pip install vulture
    - vulture . || true


# =========================
# TEST (optional stage)
# =========================
test:
  stage: test
  image: python:3.11
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest
  allow_failure: true

# =========================
# COVERAGE (FIXED)
# =========================
coverage:
  stage: coverage
  image: python:3.11
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest --cov=crop_disease_ai --cov-report=term-missing --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  allow_failure: true


# =========================
# SECURITY SCAN
# =========================
security_scan:
  stage: security
  image: python:3.11
  script:
    - pip install bandit
    - bandit -r . || true


dependency_audit:
  stage: security
  image: python:3.11
  script:
    - pip install pip-audit
    - pip-audit || true


semgrep:
  stage: security
  image: semgrep/semgrep
  script:
    - semgrep scan --config auto .
  allow_failure: true


# =========================
# PYLINT
# =========================
pylint:
  stage: lint
  image: python:3.11
  before_script:
    - python -m pip install --upgrade pip
    - pip install pylint
    - pip install -r requirements.txt || true
  script:
    - pylint . || true
  allow_failure: true


# =========================
# FLAKE8
# =========================
flake8:
  stage: lint
  image: python:3.11
  before_script:
    - python -m pip install --upgrade pip
    - pip install flake8
  script:
    - flake8 . --max-line-length=120 || true
  allow_failure: true


# =========================
# COMPLIANCE
# =========================
compliance:
  stage: compliance
  image: python:3.11
  script:
    - test -f README.md
    - test -f LICENSE || true
    - test -f SECURITY.md || true