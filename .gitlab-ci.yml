stages:
  - static_analysis  # Combines linting, formatting, and typechecking
  - security
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  RUFF_CACHE_DIR: "$CI_PROJECT_DIR/.cache/ruff"
  PYTHON_VERSION: "3.11"

# Reusable cache definition to keep things DRY
.python_cache: &python_cache
  cache:
    key:
      files:
        - pyproject.toml
    paths:
      - .cache/pip
      - .cache/ruff

# Reusable template for python jobs that actually need pip upgrades
.python_setup: &python_setup
  image: python:$PYTHON_VERSION
  <<: *python_cache
  before_script:
    - python --version
    - pip install -U pip setuptools wheel

# Global rule mapping to prevent code duplication across jobs
.workflow_rules: &workflow_rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ----------------------------------------
# STATIC ANALYSIS STAGE
# ----------------------------------------

lint_and_format:
  <<: *python_setup
  stage: static_analysis
  script:
    - pip install ruff
    - ruff check --output-format=gitlab .
    - ruff format --check .
  <<: *workflow_rules

typecheck:
  <<: *python_setup
  stage: static_analysis
  script:
    - pip install mypy
    - pip install -e .
    - mypy .
  <<: *workflow_rules

# ----------------------------------------
# SECURITY STAGE
# ----------------------------------------

security_secrets:
  stage: security
  image: zricethezav/gitleaks:latest
  # Explicitly overriding global behaviors because gitleaks doesn't use python
  before_script: [] 
  script:
    - gitleaks detect --source . --report-path gitleaks-report.json --report-format json
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 1 week
  <<: *workflow_rules

security_bandit:
  <<: *python_setup
  stage: security
  script:
    - pip install bandit
    - bandit -r src/ -f json -o bandit-report.json || true
    - bandit -r src/
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 1 week
  <<: *workflow_rules

security_dependency:
  <<: *python_setup
  stage: security
  script:
    - pip install pip-audit
    - pip-audit --requirement pyproject.toml || true
  <<: *workflow_rules

# ----------------------------------------
# TEST STAGE (Unified Tests & Coverage)
# ----------------------------------------

test_and_coverage:
  <<: *python_setup
  stage: test
  script:
    - pip install -e ".[dev]"
    - pytest --cov=. --cov-report=term --cov-report=html --cov-report=xml --cov-fail-under=80
  artifacts:
    paths:
      - coverage.xml
      - htmlcov/
    expire_in: 1 week
  <<: *workflow_rules

# ----------------------------------------
# BUILD STAGE
# ----------------------------------------

build_docker:
  stage: build
  image: docker:24-git
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  <<: *workflow_rules

# ----------------------------------------
# DEPLOY STAGE
# ----------------------------------------

deploy_staging:
  stage: deploy
  image: alpine:latest
  before_script: []
  environment:
    name: staging
    url: $STAGING_URL
  script:
    - apk add --no-cache curl
    - curl -X POST $STAGING_DEPLOY_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual

deploy_production:
  stage: deploy
  image: alpine:latest
  before_script: []
  environment:
    name: production
    url: $PRODUCTION_URL
  script:
    - apk add --no-cache curl
    - curl -X POST $PRODUCTION_DEPLOY_WEBHOOK
  rules:
    - if: $CI_COMMIT_TAG
  when: manual