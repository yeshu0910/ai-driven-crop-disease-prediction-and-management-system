stages:
  - static_analysis
  - security
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.11"

# ----------------------------------------
# GLOBAL CACHE (VERY IMPORTANT FOR SPEED)
# ----------------------------------------
cache:
  key: pip-cache
  paths:
    - .cache/pip

# ----------------------------------------
# PYTHON TEMPLATE (INSTALL ONLY ONCE PER JOB)
# ----------------------------------------
.python_job: &python_job
  image: python:$PYTHON_VERSION
  before_script:
    - python --version
    - pip install -U pip setuptools wheel
    - pip install -e ".[dev]"

# ----------------------------------------
# RULES
# ----------------------------------------
.workflow_rules: &workflow_rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ----------------------------------------
# STATIC ANALYSIS
# ----------------------------------------

lint_and_format:
  <<: *python_job
  stage: static_analysis
  script:
    - ruff check .
    - ruff format --check .
  <<: *workflow_rules

typecheck:
  <<: *python_job
  stage: static_analysis
  script:
    - mypy .
  <<: *workflow_rules

# ----------------------------------------
# SECURITY
# ----------------------------------------

security_secrets:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --report-path gitleaks-report.json --report-format json
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 1 week
  <<: *workflow_rules

security_bandit:
  <<: *python_job
  stage: security
  script:
    - bandit -r crop_disease_ai/ -f json -o bandit-report.json -s B101,B110,B311 --exclude tests
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 1 week
  <<: *workflow_rules

security_dependency:
  <<: *python_job
  stage: security
  script:
    - pip install pip-audit
    - pip-audit
  <<: *workflow_rules

# ----------------------------------------
# TEST
# ----------------------------------------

test_and_coverage:
  <<: *python_job
  stage: test
  script:
    - pytest --cov=. --cov-report=term --cov-report=xml --cov-report=html --cov-fail-under=80
  artifacts:
    paths:
      - coverage.xml
      - htmlcov/
    expire_in: 1 week
  <<: *workflow_rules

# ----------------------------------------
# BUILD
# ----------------------------------------

build_docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  <<: *workflow_rules

# ----------------------------------------
# DEPLOY
# ----------------------------------------

deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -X POST $STAGING_DEPLOY_WEBHOOK
  environment:
    name: staging
    url: $STAGING_URL
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual

deploy_production:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -X POST $PRODUCTION_DEPLOY_WEBHOOK
  environment:
    name: production
    url: $PRODUCTION_URL
  rules:
    - if: $CI_COMMIT_TAG
  when: manual
