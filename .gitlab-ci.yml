stages:
  - lint
  - format
  - type_check
  - dead_code
  - test
  - coverage
  - security
  - compliance


lint:
  stage: lint
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .


format:
  stage: format
  image: python:3.11
  script:
    - pip install ruff
    - ruff format --check .


type_check:
  stage: type_check
  image: python:3.11
  script:
    - pip install mypy
    - mypy . || true


dead_code:
  stage: dead_code
  image: python:3.11
  script:
    - pip install vulture
    - vulture . || true


test:
  stage: test
  script:
    - export PYTHONPATH=$CI_PROJECT_DIR
    - python -m pip install --upgrade pip
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest --cov=crop_disease_ai --cov-report=xml --cov-report=term-missing --cov-fail-under=80
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

coverage:
  stage: coverage
  image: python:3.11
  script:
    - pip install pytest pytest-cov
    - pytest --cov=. --cov-report=term


security_scan:
  stage: security
  image: python:3.11
  script:
    - pip install bandit
    - bandit -r . || true


dependency_audit:
  stage: security
  image: python:3.11
  script:
    - pip install pip-audit
    - pip-audit || true
    
pylint:
  stage: lint
  image: python:3.11
  before_script:
    - python -m pip install --upgrade pip
    - pip install pylint
    - pip install -r requirements.txt || true
  script:
    - pylint . || true
  allow_failure: true

flake8:
  stage: lint
  image: python:3.11
  before_script:
    - python -m pip install --upgrade pip
    - pip install flake8
  script:
    - flake8 . --max-line-length=120 || true
  allow_failure: true


semgrep:
  stage: security
  image: semgrep/semgrep
  script:
    - semgrep scan --config auto .
  allow_failure: true


compliance:
  stage: compliance
  image: python:3.11
  script:
    - test -f README.md
    - test -f LICENSE || true
    - test -f SECURITY.md || true