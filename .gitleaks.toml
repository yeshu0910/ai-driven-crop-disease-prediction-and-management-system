title = "gitleaks config"

[extend]
useDefault = true

[allowlists]
description = "Global allowlists"
paths = [
  '''(.*?)(?i)(test|spec|example|sample|fixture|mock|stub|\.md|\.txt)''',
  '''\.env\.example''',
]

[[rules]]
description = "Generic API Key"
id = "generic-api-key"
regex = '''(?i)(api[_-]?key|apikey)\s*[:=]\s*['"]?[A-Za-z0-9\-_]{20,}['"]?'''
tags = ["key", "api"]

[[rules]]
description = "AWS Access Key"
id = "aws-access-key"
regex = '''(?i)aws[_-]?(access[_-]?key|secret[_-]?key)[_-]?id?\s*[:=]\s*['"]?[A-Z0-9]{20}['"]?'''
tags = ["key", "aws"]

[[rules]]
description = "Generic Secret"
id = "generic-secret"
regex = '''(?i)(secret|password|passwd|pwd)\s*[:=]\s*['"]?[A-Za-z0-9\-_!@#$%^&*]{8,}['"]?'''
tags = ["secret", "password"]
